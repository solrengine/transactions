name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: [ "3.2", "3.3", "3.4" ]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout solrengine-rpc
        run: git clone --depth 1 https://github.com/solrengine/rpc.git ../solrengine-rpc
      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run tests
        run: bundle exec ruby -Ilib:test -e 'Dir.glob("test/**/*_test.rb").each { |f| require "./#{f}" }'

  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout solrengine-rpc
        run: git clone --depth 1 https://github.com/solrengine/rpc.git ../solrengine-rpc
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: RuboCop
        run: bundle exec rubocop
